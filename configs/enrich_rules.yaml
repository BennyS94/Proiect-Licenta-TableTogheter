schema_version: 1

macro_buckets:
  protein:
    - macro: animal_lean
      name_hints: [chicken, turkey, "pork loin", "beef sirloin", rabbit]
    - macro: animal_fatty
      name_hints: [bacon, "pork belly", "beef rib", "duck", "lamb shoulder"]
    - macro: processed_meat
      name_hints: [salami, sausage, "hot dog", frankfurter, ham, pastrami, mortadella, pepperoni]
    - macro: fish_white
      name_hints: [cod, pollock, haddock, hake, tilapia, panga, "white fish"]
    - macro: fish_fatty
      name_hints: [salmon, mackerel, herring, sardine, trout, tuna]
    - macro: dairy_fresh
      name_hints: [yogurt, yoghurt, "greek yogurt", skyr, quark, "cottage cheese", kefir]
    - macro: hard_cheese
      name_hints: [cheddar, gouda, parmesan, parmegiano, pecorino, emmental, gruyere]
    - macro: veg_pulses
      name_hints: [lentil, chickpea, "kidney bean", "black bean", "white bean", pea, "split pea", hummus]
    - macro: veg_soylike
      name_hints: [tofu, tempeh, seitan, "soy mince", "soy chunks"]


  side_carb:
    - macro: grains_whole
      name_hints: [ bulgur, quinoa, "brown rice", "wild rice", "wholegrain couscous", buckwheat, barley, spelt, farro, "oat groats" ]
    - macro: grains_refined
      name_hints: [ "white rice", rice, couscous, semolina, polenta, maize, "corn grits" ]
    - macro: pasta_noodles
      name_hints: [ pasta, spaghetti, penne, fusilli, macaroni, noodle, ramen, udon, soba, gnocchi ]
    - macro: bread
      name_hints: [ bread, baguette, ciabatta, focaccia, pita, tortilla, chapati, naan, rye, lavash, flatbread, wrap, bun, roll, bagel ]
    - macro: potatoes
      name_hints: [ potato, potatoes, "potato wedges", "mashed potato", "baked potato", "new potatoes" ]
    - macro: breakfast_cereal_whole
      name_hints: [ oat, oatmeal, porridge, muesli, bran, "wheat bran", granola_plain, "rolled oats", "steel cut oats" ]
    - macro: breakfast_cereal_sugary
      name_hints: [ cornflakes, "choco", "honey rings", "frosted", "cocoa puffs", "sugary cereal", "chocolate cereal" ]
    - macro: bakery
      name_hints: [ croissant, donut, muffin, cookie, biscuit, pastry, pie, tart, cake, strudel, "puff pastry" ]


  side_veg:
    - macro: leafy_salad
      name_hints: [lettuce, romaine, iceberg, salad, arugula, rocket, spinach, kale, chard, lambslettuce, endive, radicchio]
    - macro: cruciferous
      name_hints: [broccoli, cauliflower, cabbage, "brussels sprout", bokchoy, "bok choy", "pak choi"]
    - macro: root_veg
      name_hints: [carrot, beet, beetroot, turnip, parsnip, radish, "celeriac", swede, rutabaga]
    - macro: cooked_veg
      name_hints: [zucchini, courgette, eggplant, aubergine, pepper, "bell pepper", capsicum, tomato, onion, leek, celery, mushroom, asparagus, "green bean", "runner bean", "snow pea", "sugar snap", okra, "sweetcorn", "corn kernels"]
    - macro: mixed_veg
      name_hints: ["mixed vegetables", "vegetable mix", "frozen vegetables", "medley", "ratatouille", "stir fry mix"]

micro_buckets:
  bread:
    - micro: bread_wholegrain
      name_hints: [wholegrain, wholemeal, multigrain, seeded, rye, "brown bread"]
    - micro: bread_white
      name_hints: [white, "white bread", baguette, ciabatta]

  dairy_fresh:
    - micro: yogurt_plain
      name_hints: ["plain yogurt", "natural yogurt", "greek yogurt plain", skyr, quark]
    - micro: yogurt_sweetened
      name_hints: ["fruit yogurt", sweetened, flavoured, flavored]
    - micro: cottage
      name_hints: ["cottage cheese"]

  veg_pulses:
    - micro: lentil
      name_hints: [lentil]
    - micro: chickpea
      name_hints: [chickpea, hummus]
    - micro: bean_mixed
      name_hints: ["mixed beans", "bean mix", "three-bean"]

nutri_thresholds:
  high_salt_g_per_100g: 1.2
  very_high_salt_g_per_100g: 1.5
  high_sugars_g_per_100g: 12
  high_sat_fat_g_per_100g: 5
  low_fibre_g_per_100g: 2
  high_fibre_g_per_100g: 6
  high_energy_density_kcal_per_100g: 250

process_cues:
  fried: [fried, "deep fried", "pan fried", breaded]
  grilled: [grilled]
  roasted: [roasted]
  boiled: [boiled, steamed, poached]
  sauce_rich: [cream, cheesy, butter, "four cheese", alfredo, carbonara, mayo, aioli]
  ultra_processed_hint: [emulsifier, stabiliser, stabilizer, hydrogenated, shortening, flavour, flavor, "E1", "E2", "E3"]
  starch_powder: [ starch, "potato starch", "rice starch", "cornstarch", "corn starch" ]
  composite_dish_hint: [ pie, stew, casserole, gratin, bake, lasagna, shepherd, cottage ]
  drink: [ milkshake, smoothie, juice, soda, cola, "soft drink", lemonade, "ice tea", "iced tea", kefir-drink ]
  dairy_dessert_hint: [ icecream, "ice cream", sundae, mousse, pudding, flan, custard ]

context_cues:
  breakfasty: [breakfast, oatmeal, porridge, cereal, granola, muesli]
  dessert_like: [dessert, cake, brownie, tart, donut, "ice cream", mousse, pudding]
  snackable: [snack, cracker, chips, crisps, bar, bites]
  salad_like: [salad, "side salad"]

dietary_flags:
  vegetarian_safe_from_macros: [dairy_fresh, hard_cheese, veg_pulses, veg_soylike, grains_whole, grains_refined, pasta_noodles, bread, potatoes, breakfast_cereal_whole, breakfast_cereal_sugary, bakery, leafy_salad, cruciferous, root_veg, cooked_veg, mixed_veg]
  vegan_safe_from_macros: [veg_pulses, veg_soylike, grains_whole, grains_refined, pasta_noodles, bread, potatoes, breakfast_cereal_whole, breakfast_cereal_sugary, leafy_salad, cruciferous, root_veg, cooked_veg, mixed_veg]
