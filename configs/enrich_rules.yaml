micronutrient_thresholds:
  # per 100 g
  iron_mg:
    good: 1.4     # ~10% din 14 mg
    high: 2.8     # ~20%
  calcium_mg:
    good: 120     # ~15% din 800 mg
    high: 240
  magnesium_mg:
    good: 60      # ~16% din 375 mg
    high: 120
  potassium_mg:
    good: 300     # ~15% din 2000 mg (valoare rotunjita pentru 'good')
    high: 600
  vit_c_mg:
    good: 12      # ~15% din 80 mg
    high: 24
  vit_b12_ug:
    good: 0.3     # ~12% din 2.5 ug
    high: 0.6
